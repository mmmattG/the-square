[mod-setting-description]
the-square-nauvis-starting-square-size=Side length of the initial Nauvis square for new saves. Changing it after world creation does not resize the current square.
the-square-expansion-tiles-per-research=Target number of newly unlocked tiles funded by one science pack of each required type for square-expansion research. Lower values make each expansion cost more science. This is a startup setting and changing it requires reloading the game.
the-square-enable-logistic-network-automation=Allows the late-game logistic chest network. When disabled, passive provider chests and logistic bots still work, but active provider, buffer, requester, and storage chests are blocked.
the-square-background-tile=Uniform tile used for the managed square floor. This appears under Mod settings -> Map. Water, concrete, and stone brick style tiles are intentionally excluded. Checkerboard alternates lab-dark-1 and lab-dark-2.
the-square-screenshot-pixels-per-tile=Render density for native base screenshots. Higher values produce larger images by allocating more pixels to each tile in the captured square.
the-square-screenshot-alt-mode=When enabled, native base screenshots include entity info overlays in the same style as Factorio alt mode.
the-square-dev-mode=Shows developer-only controls for manual expansion and the expansion debug view during testing.
the-square-ingress-placement-debug=Prints ingress placement coordinates and edge-check details when you place an ingress item.
the-square-cliff-explosive-button=Shows a per-player button that grants one cliff explosive each time it is clicked.

