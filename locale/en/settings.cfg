[technology-description]
the-square-square-expansion=Repeatable research that expands the square by one ring each time a level completes. Its cost scales with the next ring's tile reward and the map setting for tiles per research pack. It starts on red science and steps up to broader science-pack sets every 10 levels.
the-square-planet-square-expansion=Infinite research that expands the managed square on __1__ by one ring. It uses only that planet's science pack and scales from the 17x17 planet baseline.
the-square-ingress-dual-lane=Upgrades every owned item Managed Line to use both yellow-belt lanes. Requires Logistics.
the-square-ingress-red=Upgrades every owned item Managed Line to red-belt throughput and increases managed fluid line throughput to the matching tier. Requires Logistics 2.
the-square-ingress-blue=Upgrades every owned item Managed Line to blue-belt throughput and increases managed fluid line throughput to the matching tier. Requires Logistics 3.
the-square-egress-turbo=Upgrades every owned item Managed Line to turbo-belt throughput and increases managed fluid line throughput to the matching tier. Requires Turbo transport belt.

