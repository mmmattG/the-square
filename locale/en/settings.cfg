[tips-and-tricks-item-description]
the-square-mod=Core rules and mechanics for this mod.
the-square-overview=This mod replaces the normal open map with a managed square that starts small and expands one ring at a time. The playable area is always the inside of the current square. Anything outside it is inaccessible void, and every expansion adds exactly one tile on each side.\n\nThe square is centered on the spawn and the newly unlocked ring is cleared for building. The run is meant to stay within this border, so compact layouts and rebuilds are part of the normal flow.
the-square-expansion-research=Square growth is driven directly by science. Every completed level of square-expansion research immediately grows the map by one ring.\n\nThe research line climbs through science bands in blocks: levels 1-10 use automation science, 11-20 add logistic science, 21-30 add chemical science, 31-40 add production and utility science, and level 41 onward continues infinitely with all science through space. The research count still scales with the size of the next ring and the map setting for tiles per research pack.\n\nThe status panel shows completed expansion levels and the next science band.
the-square-ingress-lines=Resources do not come from patches inside the square. Instead, owned ingress Managed Lines are placed into anchor slots on the current border and generate free raw resources inward from outside the map, while owned egress Managed Lines consume managed outputs by venting them outward.\n\nNauvis starts with one fluid ingress and two item ingresses in the player's inventory. Other planets do not start with Managed Lines; bring them through normal interplanetary logistics or craft more when needed. You can mine an owned ingress or egress Managed Line to stash it, then place it again on another valid anchor slot for free. Item lines and fluid lines can share sides, but fluid Managed Lines must keep at least one empty anchor slot between them.\n\nWhen the square expands, enabled ingress and egress lines move outward automatically and keep the connection going. Disabled or stashed lines remain owned but do not feed or drain resources until placed again.
the-square-uranium-egress=Sulfuric acid egress is a later managed output line. Uranium ore ingress only runs while managed sulfuric acid egress is actually removing sulfuric acid from your factory.\n\nThe uranium allowance uses the same sulfuric-acid-to-ore relationship as vanilla uranium mining, including mining productivity. All placed sulfuric acid egress lines combine into one shared allowance pool, and all placed uranium ingress lines draw from that same shared pool. One sulfuric acid line does not grant full throughput to every uranium line.
the-square-research-and-rewards=Managed Line upgrades come from dedicated research after Logistics, Logistics 2, and Logistics 3, matching those belt tiers. The square-expansion line itself steps through broader science requirements over time and then continues as an infinite all-science technology from level 41 onward.\n\nTip art is still placeholder-grade for now; proper custom instructional art is deferred to later work.
the-square-anchor-upgrades=Managed Line upgrades are global researches for owned Managed Lines. When one completes, every owned ingress and egress Managed Line covered by that tier immediately uses the new throughput without needing to be replaced.\n\nDual-lane Managed Lines add the second yellow-belt lane while still using one anchor slot. Red Managed Lines and blue Managed Lines then lift all owned item Managed Lines to those belt tiers, and fluid Managed Line throughput rises with the same progression. Space Age adds Turbo Managed Lines for both ingress and egress Managed Lines.\n\nManaged Line ownership, anchor-slot placement rules, and stashing stay the same across all upgrade tiers.
the-square-logistics-rule=Construction and deconstruction bots are allowed. Trains, handcrafting, and hand-feeding are also allowed.\n\nLogistic network automation is controlled by the map setting. When it is disabled, active provider chests, buffer chests, requester chests, and storage chests are blocked. Passive provider chests and logistic robots still work. When the setting is enabled, the logistic chest network behaves normally.
